---
- name: Ensure local kubeconfig directory exists
  ansible.builtin.file:
    path: "{{ kubeconfig_local_path }}"
    state: directory
    mode: '0700'
  delegate_to: localhost
  become: false
  run_once: true

- name: Fetch kubeconfig from first master
  ansible.builtin.fetch:
    src: /etc/rancher/rke2/rke2.yaml
    dest: "{{ kubeconfig_local_path }}/{{ kubeconfig_local_file }}"
    flat: yes
  when: inventory_hostname == groups[rke2_servers_group_name].0

- name: Replace 127.0.0.1 with actual server IP (kubeVIP) in kubeconfig
  ansible.builtin.replace:
    path: "{{ kubeconfig_local_path }}/{{ kubeconfig_local_file }}"
    regexp: 'https://127\.0\.0\.1:(\d+)'
    replace: "https://{{ kube_vip_address }}:{{ kubeconfig_server_port }}"
    mode: '0600'
  delegate_to: localhost
  become: false
  when:
    - not ansible_check_mode
    - inventory_hostname == groups[rke2_servers_group_name].0

- name: Show kubeconfig location
  ansible.builtin.debug:
    msg: "Kubeconfig saved to {{ kubeconfig_local_path }}/{{ kubeconfig_local_file }} (server: {{ kubeconfig_server_ip }}:{{ kubeconfig_server_port }})"
  delegate_to: localhost
  become: false
  run_once: true
