---
- name: Install Cilium via Helm chart
  when: inventory_hostname == groups[rke2_servers_group_name].0
  block:
    - name: Add Cilium Helm repository
      ansible.builtin.command:
        cmd: helm repo add cilium {{ cilium_helm_repo }}
      register: helm_repo_add
      changed_when: '"already exists" not in helm_repo_add.stdout'
      failed_when: helm_repo_add.rc != 0 and '"already exists" not in helm_repo_add.stdout'

    - name: Update Helm repositories
      ansible.builtin.command:
        cmd: helm repo update
      changed_when: false

    - name: Install or upgrade Cilium Helm chart
      ansible.builtin.command:
        cmd: >
          helm upgrade --install {{ cilium_release_name }} cilium/cilium
          --version {{ cilium_version }}
          --namespace {{ cilium_namespace }}
          --create-namespace
          --set kubeProxyReplacement={{ cilium_kubeproxy_replacement }}
          --set k8sServiceHost={{ rke2_api_ip }}
          --set k8sServicePort={{ rke2_apiserver_dest_port }}
          {{ cilium_helm_extra_args }}
      environment:
        KUBECONFIG: /etc/rancher/rke2/rke2.yaml
      changed_when: true

    - name: Wait for Cilium pods to be ready
      ansible.builtin.shell: |
        set -o pipefail
        {{ rke2_data_path }}/bin/kubectl --kubeconfig /etc/rancher/rke2/rke2.yaml \
          rollout status daemonset/cilium -n {{ cilium_namespace }}
      args:
        executable: /bin/bash
      register: cilium_status
      until: cilium_status.rc == 0
      retries: 40
      delay: 15
      changed_when: false
      when: not ansible_check_mode
