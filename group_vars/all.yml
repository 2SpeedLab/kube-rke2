---
# The node type - server or agent
rke2_type: "{{ 'server' if inventory_hostname in groups[rke2_servers_group_name] else 'agent' if inventory_hostname in groups[rke2_agents_group_name] }}"

# Deploy the control plane in HA mode
rke2_ha_mode: true

# Install and configure Keepalived on Server nodes
rke2_ha_mode_keepalived: false

# Install and configure kube-vip LB and VIP for cluster
# rke2_ha_mode_keepalived needs to be false
rke2_ha_mode_kubevip: true

# Kubernetes API and RKE2 registration IP address
rke2_api_ip: "{{ kube_vip_address if kube_vip_address is defined else hostvars[groups[rke2_servers_group_name].0]['ansible_default_ipv4']['address'] }}"

kube_vip_address: "10.10.24.25"

rke2_api_cidr: "23"

# optional option for RKE2 Server to listen on a private port
rke2_api_private_port: 9345

# The value for the node-name configuration item
rke2_node_name: "{{ inventory_hostname }}"

# Local data directory for RKE2
rke2_data_path: /var/lib/rancher/rke2

# Cilium installation method:
#   helm        - rke2_cni is set to 'none'; Cilium is installed by the rke2_cilium role via Helm
#   integrated  - rke2_cni is set to 'cilium'; RKE2 deploys and manages Cilium itself
cilium_install_method: cilium

# Disable kube-proxy so Cilium can replace it via eBPF (required for kubeProxyReplacement)
disable_kube_proxy: true

# CNI is derived from cilium_install_method; override only if you are not using the rke2_cilium role
rke2_cni: "{{ 'none' if cilium_install_method == 'helm' else cilium_install_method }}"

# Default Ansible Inventory Group name for RKE2 cluster
rke2_cluster_group_name: k8s_cluster

# Default Ansible Inventory Group name for RKE2 Servers
rke2_servers_group_name: masters

# Default Ansible Inventory Group name for RKE2 Agents
rke2_agents_group_name: workers

# RKE2 installation method (do not change this option)
rke2_method: tar

# Service name derived from node type
rke2_service_name: "rke2-{{ rke2_type }}.service"

# Flag set by handlers to trigger rolling restart on config change
rke2_restart_needed: false

# Cluster name (default: local)
rke2_cluster_name: 2SpeedLab

# Cluster token
rke2_token: 2SpeedLabSecret12345

# Disable RKE2 built-in ingress-nginx (set to true when using Cilium Gateway API)
rke2_disable_ingress_nginx: false
